<!DOCTYPE html>
<html>
<head>
  <title>Lecture Captures - Gallery</title>
  <link rel="stylesheet" href="gallery.css">
</head>
<body>

  <header>
    <h1 id="pageTitle">Captured Slides</h1>
    <div class="actions">
      <button id="recentlyDeletedBtn" class="primary-btn" style="background-color: #607d8b;">Recently Deleted</button>
      <button id="undoBtn" class="primary-btn" style="display: none; background-color: #ff9800;">Undo</button>
      <button id="downloadPdfBtn" class="primary-btn">Download PDF</button>
      <button id="clearAllBtn" class="danger-btn">Clear All</button>
      <button id="backToGalleryBtn" class="primary-btn" style="display: none; background-color: #2196F3;">Back to Gallery</button>
      <button id="emptyTrashBtn" class="danger-btn" style="display: none;">Empty Trash</button>
    </div>
  </header>

  <main id="gallery-container">
    <p id="empty-state">No images captured yet.</p>
    <div id="grid"></div>
  </main>

  <script src="jspdf.min.js"></script>
  <script src="gallery.js"></script>
</body>
</html>
