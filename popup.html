<!DOCTYPE html>
<html>

<head>
  <title>Lecture Capture</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <h2>Lecture Capture</h2>

  <label>Select Capture Interval</label>

  <select id="interval">
    <option value="1">1 second</option>
    <option value="2">2 second</option>
    <option value="3">3 second</option>
    <option value="5">5 seconds</option>
    <option value="10">10 seconds</option>
    <option value="20">20 seconds</option>
    <option value="30">30 seconds</option>
  </select>

  <br><br>
  <label>Select Image Quality</label>
  <select id="quality">
    <option value="0.1">Low</option>
    <option value="0.3" selected>Medium</option>
    <option value="0.5">High</option>
    <option value="0.8">Very High</option>
    <option value="1.0">Original</option>
  </select>
  <br><br>

  <button id="drawBtn" style="background-color: #2196F3; color: white; margin-bottom: 10px; width: 100%; border: none; padding: 10px; cursor: pointer; font-weight: bold; border-radius: 4px;">Draw Ignore Area</button>
  <button id="startBtn">Start Capture</button>
  <button id="stopBtn">Stop Capture</button>
  <hr>
  <button id="galleryBtn" style="background-color: #4CAF50; color: white;">View Gallery</button>

  <script src="popup.js"></script>

</body>

</html>
